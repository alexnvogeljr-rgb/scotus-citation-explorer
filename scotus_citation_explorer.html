<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCOTUS Citation Explorer</title>
<meta name="description" content="Explore 4,133 U.S. Supreme Court opinions and 55,136 citations as an interactive citation network.">
<meta name="theme-color" content="#07070d">
<meta property="og:title" content="SCOTUS Citation Explorer">
<meta property="og:description" content="An interactive map of Supreme Court opinions, citation links, and doctrinal communities.">
<meta property="og:type" content="website">
<meta property="og:image" content="citation_galaxy.png">
<style>
:root{--bg:#07070d;--panel:#11131c;--ink:#e7ecf5;--mut:#8b95ab;--line:#222637;--bar-h:58px;}
*{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
#wrap{position:fixed;inset:0}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;cursor:grab}
canvas.drag{cursor:grabbing}
.bar{position:absolute;top:0;left:0;right:0;display:flex;gap:10px;align-items:center;padding:9px 12px;background:linear-gradient(#0b0d16f5,#0b0d16ad);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:5;flex-wrap:wrap}
.brand{display:flex;gap:10px;align-items:baseline;min-width:260px}
.tools{display:flex;gap:8px;align-items:center;flex:1;flex-wrap:wrap}
.bar h1{font-size:14px;margin:0 2px 0 0;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.bar .sub{color:var(--mut);font-size:11px;white-space:nowrap}
.bar input,.bar button{background:#171a26;border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:6px 9px;font-size:12px;min-height:32px}
.bar input{width:min(28vw,270px);min-width:190px}
.bar input.loading{border-color:#7da2ff}
.bar button{cursor:pointer;white-space:nowrap} .bar button:hover{border-color:#3a4d7a}
.bar button:focus-visible,.bar input:focus-visible{outline:2px solid #7da2ff;outline-offset:2px}
.bar button.on{background:#24314e;border-color:#3f5d8f}
.spacer{flex:1}
#legend{position:absolute;left:12px;bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px;z-index:5;max-width:230px}
#legend b{font-size:11px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.lgctl{font-weight:400;text-transform:none;letter-spacing:0;font-size:11px}
.lgctl a{color:#7da2ff;cursor:pointer} .lgctl a:hover{text-decoration:underline}
.li{display:flex;align-items:center;gap:7px;padding:2px 0;cursor:pointer;opacity:1}
.li.off{opacity:.32}
.li.cmpA,.li.cmpB{opacity:1;border-radius:6px;padding-left:4px;background:#24314e}
.li.cmpB{background:#33294a}
.sw{width:11px;height:11px;border-radius:3px;flex:none}
.li span{font-size:11.5px}
#stats{position:absolute;right:12px;bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px;z-index:5;color:var(--mut);font-size:11px;text-align:right;max-width:320px}
#stats b{color:var(--ink)}
#tip{position:absolute;z-index:9;pointer-events:none;background:#0e1018f2;border:1px solid var(--line);border-radius:8px;padding:8px 10px;max-width:300px;display:none;box-shadow:0 6px 24px #000a}
#tip .t{font-weight:700;margin-bottom:3px}
#tip .m{color:var(--mut);font-size:11px}
#tip .go{color:#7da2ff;font-size:11px;margin-top:4px}
#panel{position:absolute;top:calc(var(--bar-h) + 12px);right:12px;width:min(360px,calc(100vw - 24px));max-height:calc(100vh - var(--bar-h) - 24px);overflow:auto;background:#10131dd9;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 36px #0009;backdrop-filter:blur(8px);z-index:7;padding:12px}
#panel.hidden{display:none}
.ph{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.ph h2{font-size:15px;line-height:1.25;margin:0;flex:1}
.x{width:26px;height:26px;padding:0!important;min-height:0!important}
.meta{color:var(--mut);font-size:11px;margin-bottom:10px}
.pbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}
.pbtns button,.pbtns a,.casebtn{background:#171a26;border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:6px 8px;font-size:12px;cursor:pointer;text-align:left;text-decoration:none}
.pbtns button:hover,.pbtns a:hover,.casebtn:hover{border-color:#3a4d7a}
.section{border-top:1px solid var(--line);padding-top:9px;margin-top:9px}
.section h3{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);margin:0 0 6px}
.casebtn{display:block;width:100%;margin:4px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pathstat{font-size:11px;color:var(--mut);margin-top:5px}
.note{position:absolute;top:calc(var(--bar-h) + 10px);left:50%;transform:translateX(-50%);background:#1a2336;border:1px solid #2b3a5c;color:#cdd8ee;padding:6px 12px;border-radius:20px;font-size:11.5px;z-index:6;white-space:nowrap}
.area-layout .note,.area-layout #stats{display:none}
kbd{background:#222637;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:0 5px;font-size:11px}
@media (max-width:900px){
  .note,#stats{display:none}
  .bar{align-items:stretch;padding:8px}
  .brand{width:100%;min-width:0;justify-content:space-between}
  .tools{width:100%;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
  .tools::-webkit-scrollbar{height:0}
  .bar input{width:220px;min-width:220px}
  #legend{left:8px;right:8px;bottom:8px;max-width:none;max-height:34vh;overflow:auto;border-radius:8px}
  #legitems{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));column-gap:10px}
  .li{min-height:26px}
}
@media (max-width:560px){
  .tools{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));overflow:visible}
  .bar input{grid-column:1/-1;grid-row:1;width:100%;min-width:0}
  #bLayout{grid-column:1/3;grid-row:2}
  #bEdges{grid-column:3/5;grid-row:2}
  #bLandmarks{grid-column:1/3;grid-row:3}
  #bCompare{grid-column:3/5;grid-row:3}
  #bFit{grid-column:1;grid-row:4}
  #bClear{grid-column:2;grid-row:4}
  #bZin{grid-column:3;grid-row:4}
  #bZout{grid-column:4;grid-row:4}
  .spacer{display:none}
  #panel{left:8px;right:8px;top:calc(var(--bar-h) + 8px);width:auto;max-height:42vh}
}
@media (max-width:430px){
  .brand .sub{display:none}
  .bar input{width:100%;min-width:0}
  .bar button{padding-inline:8px}
  .li span{font-size:10.5px}
}
</style></head>

    ctx.globalAlpha=al; ctx.fillStyle=COL[ia];

    for(let ia=0;ia<AREA_LABELS.length;ia++){if(!active.has(ia))continue;const a=AREA_LABELS[ia],p=world2screen(a.x,a.y-a.r-10/scale);if(p[0]<-120||p[0]>W+120||p[1]<-30||p[1]>H+30)continue;ctx.strokeText(D.IANAMES[ia],p[0],p[1]);ctx.fillStyle='rgba(231,236,245,0.82)';ctx.fillText(D.IANAMES[ia],p[0],p[1]);}

}
function loop(){ if(needs){try{draw();}catch(err){console.error('draw error',err);} needs=false;} requestAnimationFrame(loop); }
// ---- live case-name lookup from CourtListener (anonymous search API) ----
let lastMouse={x:0,y:0};
const CACHE_KEY='scotus-case-name-cache-v1';
let storedNames={};try{storedNames=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}')||{};}catch(e){}
const nameCache={...storedNames}, citeCache={}, urlCache={}, tipEl=document.getElementById('tip'), qEl=document.getElementById('q'), panelEl=document.getElementById('panel');
let lookupPausedUntil=0, hoverFetchTimer=0;
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function saveNameCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify(Object.fromEntries(Object.entries(nameCache).filter(([,v])=>typeof v==='string'&&v))));}catch(e){}}
function absoluteCourtListenerUrl(url){
  if(!url)return'';
  return url.startsWith('http')?url:'https://www.courtlistener.com'+url;
}
function slugifyCaseName(s){
  return s.toLowerCase().replace(/&/g,' and ').replace(/['\u2019]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}
function caseUrl(i){
  const id=D.IDS[i], cached=absoluteCourtListenerUrl(urlCache[id]||'');
  if(cached)return cached;
  const title=cleanCaseTitle(i);
  if(/^(CourtListener #|Looking up|CourtListener lookup)/i.test(title))return 'https://www.courtlistener.com/?q='+encodeURIComponent('id:'+id);
  const slug=slugifyCaseName(title);
  if(slug)return 'https://www.courtlistener.com/opinion/'+id+'/'+slug+'/';
  return 'https://www.courtlistener.com/?q='+encodeURIComponent('id:'+id);
}
function handleLookupFailure(id,j){
  const detail=String(j&&j.detail||'');
  if(/throttled|rate limit/i.test(detail)){
    const m=detail.match(/(?:available in|Expected available in)\s+(\d+)/i);
    lookupPausedUntil=Date.now()+((m?Number(m[1]):90)+2)*1000;
  }

}
function scheduleNameFetch(idx){clearTimeout(hoverFetchTimer);if(idx<0)return;hoverFetchTimer=setTimeout(()=>{if(hover===idx)fetchName(idx);},360);}
function fetchName(idx){
  const id=D.IDS[idx]; if(D.NAME&&D.NAME[idx])return; if(typeof nameCache[id]==='string'&&nameCache[id])return; if(nameCache[id]===null)return;
  if(Date.now()<lookupPausedUntil){if(hover===idx)renderTip(idx,lastMouse.x,lastMouse.y);return;}
  nameCache[id]=null;
  fetch('https://www.courtlistener.com/api/rest/v4/search/?type=o&q=id%3A'+encodeURIComponent(id),{headers:{'Accept':'application/json'}})
    .then(async r=>({ok:r.ok,j:await r.json().catch(()=>null)})).then(({ok,j})=>{
      if(!ok){handleLookupFailure(id,j);if(hover===idx)renderTip(idx,lastMouse.x,lastMouse.y);return;}
      const res=j&&j.results&&j.results[0];
      if(res){ nameCache[id]=res.caseName||res.case_name||''; const c=(res.citation||res.citations||[]).find(x=>/U\.S\./.test(x)); citeCache[id]=c||''; urlCache[id]=absoluteCourtListenerUrl(res.absolute_url||''); saveNameCache(); }
      else nameCache[id]='';
      if(hover===idx) renderTip(idx,lastMouse.x,lastMouse.y);
      if(sel===idx) renderPanel(idx);
    }).catch(()=>{ delete nameCache[id]; if(hover===idx) renderTip(idx,lastMouse.x,lastMouse.y); });
}
function titleFor(i){
  const id=D.IDS[i];
  if(D.NAME&&D.NAME[i]) return D.NAME[i];
  if(typeof nameCache[id]==='string'&&nameCache[id]) return nameCache[id]+(citeCache[id]?(' · '+citeCache[id]):'');
  if(nameCache[id]===null) return 'Looking up case name…';
  if(Date.now()<lookupPausedUntil) return 'CourtListener lookup is rate-limited';
  return 'CourtListener #'+id;
}
function applyNameRecord(id,rec){
  if(!rec)return;
  if(typeof rec==='string'){nameCache[id]=rec;}
  else{nameCache[id]=rec.name||rec.case_name||rec.caseName||'';citeCache[id]=rec.citation||rec.us_cite||rec.usCite||'';urlCache[id]=absoluteCourtListenerUrl(rec.url||rec.absolute_url||'');}
}
function loadStaticNames(){
  fetch('case_names.json',{cache:'force-cache'}).then(r=>r.ok?r.json():null).then(j=>{
    if(!j)return;
    for(const id in j)applyNameRecord(id,j[id]);
    saveNameCache();needs=true;
    if(hover>=0)renderTip(hover,lastMouse.x,lastMouse.y);
    if(sel>=0)renderPanel(sel);

}
function renderTip(i,x,y){
  if(i<0){ tipEl.style.display='none'; return; }

  tipEl.style.display='block'; tipEl.style.left=Math.max(12,Math.min(W-tw-12,x+14))+'px'; tipEl.style.top=Math.max(12,Math.min(H-110,y+14))+'px';
  tipEl.innerHTML='<div class="t">'+esc(titleFor(i))+'</div><div class="m">'+(D.YR[i]||'&#8212;')+' &#183; '+esc(D.IANAMES[D.IA[i]])+'<br>Cited by '+D.DEG[i]+' later opinions &#183; cites '+outA[i].length+' shown</div><div class="go">click for case details &#8594;</div>';

function caseButton(i){return '<button class="casebtn" data-case="'+i+'">'+esc(shortTitle(i))+' <span class="meta">'+(D.YR[i]||'')+'</span></button>';}
function caseList(arr,max){return arr.slice().sort((a,b)=>(D.DEG[b]||0)-(D.DEG[a]||0)).slice(0,max).map(caseButton).join('')||'<div class="meta">None in this filtered graph</div>';}
function pathLabel(){if(pathStart<0&&pathEnd<0)return 'No path endpoints set';return 'Start: '+(pathStart>=0?shortTitle(pathStart):'none')+'<br>End: '+(pathEnd>=0?shortTitle(pathEnd):'none')+(pathNodes.length?'<br>'+pathNodes.length+' cases in shortest connection':'');}
function renderPanel(i){

    '<div class="meta">'+(D.YR[i]||'Unknown year')+' &#183; '+esc(D.IANAMES[D.IA[i]])+'<br>Cited by '+D.DEG[i]+' later opinions &#183; cites '+outA[i].length+' shown<br>CourtListener #'+esc(id)+'</div>'+
    '<div class="pbtns"><button data-act="start">Set path start</button><button data-act="end">Set path end</button><a href="'+esc(caseUrl(i))+'" target="_blank" rel="noopener">Open CourtListener</a><button data-act="clearPath">Clear path</button></div>'+
    '<div class="pathstat">'+pathLabel()+'</div>'+
    '<div class="section"><h3>Cites</h3>'+caseList(outA[i],7)+'</div>'+
    '<div class="section"><h3>Cited by</h3>'+caseList(inA[i],7)+'</div>';
}
function shortestPath(a,b){
  if(a<0||b<0)return[];
  if(a===b)return[a];
  const prev=new Int32Array(N);prev.fill(-2);prev[a]=-1;
  const q=[a];let head=0;
  while(head<q.length){
    const u=q[head++], ns=outA[u].concat(inA[u]);
    for(const v of ns){if(prev[v]!==-2)continue;prev[v]=u;if(v===b){head=q.length;break;}q.push(v);}
  }
  if(prev[b]===-2)return[];

function updatePath(){
  pathNodes=shortestPath(pathStart,pathEnd);
  pathPairs=[];pathNodeSet=pathNodes.length?new Set(pathNodes):null;pathEdgeSet=new Set();
  for(let i=1;i<pathNodes.length;i++){pathPairs.push([pathNodes[i-1],pathNodes[i]]);pathEdgeSet.add(edgeKey(pathNodes[i-1],pathNodes[i]));}

}
function setPathPoint(which,i){if(which==='start')pathStart=i;else pathEnd=i;updatePath();renderPanel(i);}

function focusCase(i){selectCase(i,true);}
function localSearch(v){
  let i=D.IDS.indexOf(v);
  if(i<0){const lv=v.toLowerCase(); for(let j=0;j<N;j++){const nm=(D.NAME&&D.NAME[j])||nameCache[D.IDS[j]]||'';if(nm&&nm.toLowerCase().includes(lv)){i=j;break;}}}
  return i;
}
function idFromSearchResult(res){
  const raw=String(res.absolute_url||res.resource_uri||res.cluster_url||'');
  const m=raw.match(/\/opinion\/(\d+)\//);
  return m?m[1]:'';
}
async function remoteSearch(v){
  const url='https://www.courtlistener.com/api/rest/v4/search/?type=o&court=scotus&q='+encodeURIComponent(v);
  const j=await fetch(url,{headers:{'Accept':'application/json'}}).then(async r=>{const j=await r.json().catch(()=>null);if(!r.ok){handleLookupFailure('',j);return null;}return j;});

cv.addEventListener('touchmove',e=>{if(!dragging||e.touches.length!==1)return;e.preventDefault();const t=e.touches[0],dx=t.clientX-lastX,dy=t.clientY-lastY;if(Math.abs(t.clientX-downX)+Math.abs(t.clientY-downY)>4)didDrag=true;tx+=dx;ty+=dy;lastX=t.clientX;lastY=t.clientY;needs=true;},{passive:false});
