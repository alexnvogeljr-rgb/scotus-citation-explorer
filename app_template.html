<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCOTUS Citation Explorer</title>
<meta name="description" content="Explore 4,133 U.S. Supreme Court opinions and 55,136 citations as an interactive citation network.">
<meta name="theme-color" content="#07070d">
<meta property="og:title" content="SCOTUS Citation Explorer">
<meta property="og:description" content="An interactive map of Supreme Court opinions, citation links, and doctrinal communities.">
<meta property="og:type" content="website">
<meta property="og:image" content="citation_galaxy.png">
<style>
:root{--bg:#07070d;--panel:#11131c;--ink:#e7ecf5;--mut:#8b95ab;--line:#222637;--bar-h:58px;}
*{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
#wrap{position:fixed;inset:0}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;display:block;cursor:grab}
canvas.drag{cursor:grabbing}
.bar{position:absolute;top:0;left:0;right:0;display:flex;gap:10px;align-items:center;padding:9px 12px;background:linear-gradient(#0b0d16f5,#0b0d16ad);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:5;flex-wrap:wrap}
.brand{display:flex;gap:10px;align-items:baseline;min-width:260px}
.tools{display:flex;gap:8px;align-items:center;flex:1;flex-wrap:wrap}
.bar h1{font-size:14px;margin:0 2px 0 0;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.bar .sub{color:var(--mut);font-size:11px;white-space:nowrap}
.bar input,.bar button,.bar select{background:#171a26;border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:6px 9px;font-size:12px;min-height:32px}
.bar input{width:min(28vw,270px);min-width:190px}
.bar select{cursor:pointer;white-space:nowrap;appearance:auto}
.bar input.loading{border-color:#7da2ff}
.bar button{cursor:pointer;white-space:nowrap} .bar button:hover{border-color:#3a4d7a}
.bar button:focus-visible,.bar input:focus-visible,.bar select:focus-visible{outline:2px solid #7da2ff;outline-offset:2px}
.bar button.on{background:#24314e;border-color:#3f5d8f}
.spacer{flex:1}
#legend{position:absolute;left:12px;bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px;z-index:5;max-width:230px}
#legend b{font-size:11px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.lgctl{font-weight:400;text-transform:none;letter-spacing:0;font-size:11px}
.lgctl a{color:#7da2ff;cursor:pointer} .lgctl a:hover{text-decoration:underline}
.li{display:flex;align-items:center;gap:7px;padding:2px 0;cursor:pointer;opacity:1}
.li.off{opacity:.32}
.li.cmpA,.li.cmpB{opacity:1;border-radius:6px;padding-left:4px;background:#24314e}
.li.cmpB{background:#33294a}
.sw{width:11px;height:11px;border-radius:3px;flex:none}
.li span{font-size:11.5px}
#stats{position:absolute;right:12px;bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px;z-index:5;color:var(--mut);font-size:11px;text-align:right;max-width:320px}
#stats b{color:var(--ink)}
#tip{position:absolute;z-index:9;pointer-events:none;background:#0e1018f2;border:1px solid var(--line);border-radius:8px;padding:8px 10px;max-width:300px;display:none;box-shadow:0 6px 24px #000a}
#tip .t{font-weight:700;margin-bottom:3px}
#tip .m{color:var(--mut);font-size:11px}
#tip .go{color:#7da2ff;font-size:11px;margin-top:4px}
#panel{position:absolute;top:calc(var(--bar-h) + 12px);right:12px;width:min(360px,calc(100vw - 24px));max-height:calc(100vh - var(--bar-h) - 24px);overflow:auto;background:#10131dd9;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 36px #0009;backdrop-filter:blur(8px);z-index:7;padding:12px}
#panel.hidden{display:none}
.ph{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px}
.ph h2{font-size:15px;line-height:1.25;margin:0;flex:1}
.x{width:26px;height:26px;padding:0!important;min-height:0!important}
.meta{color:var(--mut);font-size:11px;margin-bottom:10px}
.pbtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}
.pbtns button,.pbtns a,.casebtn{background:#171a26;border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:6px 8px;font-size:12px;cursor:pointer;text-align:left;text-decoration:none}
.pbtns button:hover,.pbtns a:hover,.casebtn:hover{border-color:#3a4d7a}
.section{border-top:1px solid var(--line);padding-top:9px;margin-top:9px}
.section h3{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);margin:0 0 6px}
.casebtn{display:block;width:100%;margin:4px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pathstat{font-size:11px;color:var(--mut);margin-top:5px}
.note{position:absolute;top:calc(var(--bar-h) + 10px);left:50%;transform:translateX(-50%);background:#1a2336;border:1px solid #2b3a5c;color:#cdd8ee;padding:6px 12px;border-radius:20px;font-size:11.5px;z-index:6;white-space:nowrap}
.area-layout .note,.cluster-layout .note,.area-layout #stats{display:none}
kbd{background:#222637;border:1px solid var(--line);border-bottom-width:2px;border-radius:4px;padding:0 5px;font-size:11px}
@media (max-width:900px){
  .note,#stats{display:none}
  .bar{align-items:stretch;padding:8px}
  .brand{width:100%;min-width:0;justify-content:space-between}
  .tools{width:100%;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
  .tools::-webkit-scrollbar{height:0}
  .bar input{width:220px;min-width:220px}
  #legend{left:8px;right:8px;bottom:8px;max-width:none;max-height:34vh;overflow:auto;border-radius:8px}
  #legitems{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));column-gap:10px}
  .li{min-height:26px}
}
@media (max-width:560px){
  .tools{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));overflow:visible}
  .bar input{grid-column:1/-1;grid-row:1;width:100%;min-width:0}
  #bLayout{grid-column:1/3;grid-row:2}
  #bEdges{grid-column:3/5;grid-row:2}
  #bLandmarks{grid-column:1/3;grid-row:3}
  #bCompare{grid-column:3/5;grid-row:3}
  #caseLimit{grid-column:1/3;grid-row:4}
  #bFit{grid-column:3;grid-row:4}
  #bClear{grid-column:4;grid-row:4}
  #bZin{grid-column:1;grid-row:5}
  #bZout{grid-column:2;grid-row:5}
  .spacer{display:none}
  #panel{left:8px;right:8px;top:calc(var(--bar-h) + 8px);width:auto;max-height:42vh}
}
@media (max-width:430px){
  .brand .sub{display:none}
  .bar input{width:100%;min-width:0}
  .bar button{padding-inline:8px}
  .li span{font-size:10.5px}
}
</style></head>
<body><div id="wrap">
<canvas id="c"></canvas>
<div class="bar" role="banner">
  <div class="brand"><h1>&#9878;&#65038; SCOTUS Citation Explorer</h1><span class="sub" id="subline"></span></div>
  <div class="tools" role="toolbar" aria-label="Explorer controls">
  <input id="q" aria-label="Search cases" placeholder="Search case name or CL ID&#8230;" size="18" autocomplete="off">
  <button id="bLayout" type="button">Layout: Citation web</button>
  <button id="bEdges" type="button" aria-pressed="false">Show all edges: off</button>
  <button id="bLandmarks" type="button" class="on" aria-pressed="true">Landmarks: on</button>
  <select id="caseLimit" aria-label="Shown cases">
    <option value="0">Cases: all</option>
    <option value="1000">Top 1,000</option>
    <option value="500">Top 500</option>
    <option value="100">Top 100</option>
    <option value="50">Top 50</option>
  </select>
  <button id="bCompare" type="button" aria-pressed="false">Compare areas: off</button>
  <button id="bZin" type="button" title="Zoom in" aria-label="Zoom in">+</button>
  <button id="bZout" type="button" title="Zoom out" aria-label="Zoom out">&#8722;</button>
  <button id="bFit" type="button">Reset view</button>
  <button id="bClear" type="button">Clear</button>
  <span class="spacer"></span>
  </div>
</div>
<div class="note">1792-2016 core citation network &#183; CourtListener-linked opinions</div>
<div id="legend"><b>Area of law <span class="lgctl">&#8212; <a id="selAll">all</a> &#183; <a id="selNone">none</a></span></b><div id="legitems"></div></div>
<div id="stats"></div>
<div id="tip"></div>
<aside id="panel" class="hidden" aria-live="polite"></aside>
</div>
<script>
/*__DATA__*/
const D=window.DATA, N=D.IDS.length, E=D.EU.length;
const cv=document.getElementById('c'), ctx=cv.getContext('2d'), barEl=document.querySelector('.bar');
let DPR=Math.min(2,window.devicePixelRatio||1), W=0,H=0;
const PX=new Float32Array(N), PY=new Float32Array(N);
for(let i=0;i<N;i++){PX[i]=D.WX[i];PY[i]=D.WY[i];}
let layout='web';
const AX=new Float32Array(N), AY=new Float32Array(N), AREA_LABELS=[];
const TCX=new Float32Array(N), TCY=new Float32Array(N), CLUSTER_LANDMARKS=[], CLUSTER_GROUPS=[];
const CLUSTER_NAMES={
  0:'Speech & Association',
  1:'Criminal Trials & Habeas',
  2:'Standing & Judicial Review',
  3:'Administrative State & Statutes',
  4:'Equal Protection & Due Process',
  5:'Jurisdiction & Double Jeopardy',
  6:'Commerce & Federal Power',
  7:'Searches & Seizures',
  8:'Tribal Sovereignty & Public Lands',
  9:'Antitrust, Preemption & Markets',
  10:'Federal Courts & Civil Rights Remedies'
};
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function buildAreaLayout(){
  const groups=Array.from({length:D.IANAMES.length},()=>[]);
  for(let i=0;i<N;i++)groups[D.IA[i]].push(i);
  const cols=5, areaW=1550, areaH=1080, mx=115, my=125, sx=(areaW-mx*2)/(cols-1), sy=(areaH-my*2)/2;
  for(let ia=0;ia<groups.length;ia++){
    const g=groups[ia], cx=mx+(ia%cols)*sx, cy=my+Math.floor(ia/cols)*sy;
    if(!g.length){AREA_LABELS[ia]={x:cx,y:cy,r:0,n:0};continue;}
    let bx=0,by=0;
    for(const i of g){bx+=D.CX[i]??D.WX[i];by+=D.CY[i]??D.WY[i];}
    bx/=g.length;by/=g.length;
    const ds=g.map(i=>Math.hypot((D.CX[i]??D.WX[i])-bx,(D.CY[i]??D.WY[i])-by)).sort((a,b)=>a-b);
    const target=Math.min(88,30+Math.sqrt(g.length)*1.6), p90=ds[Math.floor(ds.length*.9)]||1;
    const s=Math.min(0.95,target/p90), lim=target*1.16;
    for(const i of g){
      AX[i]=cx+clamp(((D.CX[i]??D.WX[i])-bx)*s,-lim,lim);
      AY[i]=cy+clamp(((D.CY[i]??D.WY[i])-by)*s,-lim,lim);
    }
    AREA_LABELS[ia]={x:cx,y:cy,r:target,n:g.length};
  }
}
function buildClusterLayout(){
  CLUSTER_LANDMARKS.length=0;CLUSTER_GROUPS.length=0;
  const seen=new Set(), groups=new Map(), comm=D.COM||[];
  for(let i=0;i<N;i++){
    TCX[i]=D.CX[i];TCY[i]=D.CY[i];
    const c=comm[i]!==undefined&&comm[i]!==null&&comm[i]!==''?Number(comm[i]):D.IA[i];
    if(!Number.isFinite(c)||c<0)continue;
    let g=groups.get(c);if(!g){g=[];groups.set(c,g);}
    g.push(i);
  }
  for(const [c,g] of groups){
    const ac=new Map();for(const i of g)ac.set(D.IA[i],(ac.get(D.IA[i])||0)+1);
    const dom=Array.from(ac).sort((a,b)=>b[1]-a[1])[0]?.[0]??0;
    CLUSTER_GROUPS.push({id:c,name:CLUSTER_NAMES[c]||('Cluster '+(Number(c)+1)),idx:g,ia:dom});
    const top=g.slice().sort((a,b)=>(D.DEG[b]||0)-(D.DEG[a]||0)).slice(0,5);
    for(const i of top){if(!seen.has(i)){seen.add(i);CLUSTER_LANDMARKS.push(i);}}
    if(top.length<2)continue;
    let cx=0,cy=0;
    for(const i of top){cx+=D.CX[i];cy+=D.CY[i];}
    cx/=top.length;cy/=top.length;
    const ring=Math.max(32,Math.min(78,Math.sqrt(g.length)*4.2));
    const rot=((Number(c)||0)%11)*0.31-Math.PI/2;
    for(let n=0;n<top.length;n++){
      const i=top[n], a=rot+n*2*Math.PI/top.length;
      TCX[i]=cx+Math.cos(a)*ring;
      TCY[i]=cy+Math.sin(a)*ring;
    }
  }
  CLUSTER_GROUPS.sort((a,b)=>a.id-b.id);
  CLUSTER_LANDMARKS.sort((a,b)=>(D.DEG[b]||0)-(D.DEG[a]||0));
}
const outA=Array.from({length:N},()=>[]), inA=Array.from({length:N},()=>[]);
for(let k=0;k<E;k++){outA[D.EU[k]].push(D.EV[k]);inA[D.EV[k]].push(D.EU[k]);}
let scale=1, fittedScale=1, tx=0, ty=0;
function world2screen(x,y){return [x*scale+tx, y*scale+ty];}
function screen2world(x,y){return [(x-tx)/scale,(y-ty)/scale];}
function zoomAt(mx,my,factor){const[wx,wy]=screen2world(mx,my);scale=Math.max(0.02,Math.min(3000,scale*factor));tx=mx-wx*scale;ty=my-wy*scale;needs=true;}
function rad(i){return 0.7+Math.pow(D.DEG[i]||0,0.72)*0.52;}
const active=new Set(D.IANAMES.map((_,i)=>i));
const LANDMARKS=Array.from({length:N},(_,i)=>i).sort((a,b)=>(D.DEG[b]||0)-(D.DEG[a]||0)).slice(0,50);
const TOP_ORDER=Array.from({length:N},(_,i)=>i).sort((a,b)=>(D.DEG[b]||0)-(D.DEG[a]||0));
const RANK=new Int32Array(N);TOP_ORDER.forEach((i,r)=>{RANK[i]=r+1;});
let caseLimit=0;
let hover=-1, sel=-1, showEdges=false, showLandmarks=true, compareMode=false, dragging=false, didDrag=false, lastX=0,lastY=0, downX=0,downY=0;
let compareAreas=[], pathStart=-1, pathEnd=-1, pathNodes=[], pathPairs=[], pathNodeSet=null, pathEdgeSet=null;
let needs=true;
function edgeKey(a,b){return a<b?a+'-'+b:b+'-'+a;}
function passesCaseLimit(i){return !caseLimit||RANK[i]<=caseLimit;}
function isNodeEligible(i){const ia=D.IA[i];return passesCaseLimit(i)&&active.has(ia)&&(!compareMode||compareAreas.length===0||compareAreas.includes(ia));}
function shownCaseCount(){let n=0;for(let i=0;i<N;i++)if(isNodeEligible(i))n++;return n;}
function shownEdgeCount(){let n=0;for(let k=0;k<E;k++)if(isNodeEligible(D.EU[k])&&isNodeEligible(D.EV[k]))n++;return n;}
function shownNeighbors(arr){return arr.filter(isNodeEligible);}
function refreshVisibility(refit){
  if(hover>=0&&!isNodeEligible(hover)){hover=-1;renderTip(-1,0,0);}
  if(sel>=0&&!isNodeEligible(sel)){sel=-1;renderPanel(-1);}
  if(pathStart>=0&&!isNodeEligible(pathStart))pathStart=-1;
  if(pathEnd>=0&&!isNodeEligible(pathEnd))pathEnd=-1;
  updatePath();
  if(sel>=0)renderPanel(sel);
  updateStats();
  if(refit)fit(); else needs=true;
}
let grid=null, GCELL=7, GW=0, GMINX=0, GMINY=0;
function buildGrid(){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for(let i=0;i<N;i++){if(PX[i]<minx)minx=PX[i];if(PY[i]<miny)miny=PY[i];if(PX[i]>maxx)maxx=PX[i];if(PY[i]>maxy)maxy=PY[i];}
  GMINX=minx;GMINY=miny;GW=Math.ceil((maxx-minx)/GCELL)+1;
  grid=new Map();
  for(let i=0;i<N;i++){const cx=((PX[i]-minx)/GCELL)|0, cy=((PY[i]-miny)/GCELL)|0;const key=cy*GW+cx;let a=grid.get(key);if(!a){a=[];grid.set(key,a);}a.push(i);}
}
function pick(sx,sy){
  const [wx,wy]=screen2world(sx,sy); const thr=Math.max(6/scale, 3);
  const cx=((wx-GMINX)/GCELL)|0, cy=((wy-GMINY)/GCELL)|0; let best=-1,bd=1e18;
  const R=Math.max(1,Math.ceil(thr/GCELL));
  for(let yy=cy-R;yy<=cy+R;yy++)for(let xx=cx-R;xx<=cx+R;xx++){
    const a=grid.get(yy*GW+xx); if(!a)continue;
    for(const i of a){if(!isNodeEligible(i))continue;const dx=PX[i]-wx,dy=PY[i]-wy,d=dx*dx+dy*dy; const rr=Math.max(thr, rad(i)/scale); if(d<rr*rr&&d<bd){bd=d;best=i;}}
  }
  return best;
}
function fit(){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  let found=0;
  for(let i=0;i<N;i++){if(!isNodeEligible(i))continue;if(layout!=='area'&&PY[i]>1010)continue;if(PX[i]<minx)minx=PX[i];if(PY[i]<miny)miny=PY[i];if(PX[i]>maxx)maxx=PX[i];if(PY[i]>maxy)maxy=PY[i];found++;}
  if(!found){for(let i=0;i<N;i++){if(!passesCaseLimit(i))continue;if(layout!=='area'&&PY[i]>1010)continue;if(PX[i]<minx)minx=PX[i];if(PY[i]<miny)miny=PY[i];if(PX[i]>maxx)maxx=PX[i];if(PY[i]>maxy)maxy=PY[i];found++;}}
  if(!found)return;
  const pad=60, topPad=layout==='area'?(barEl.offsetHeight||58)+36:pad, bottomPad=60;
  const sx=(W-pad*2)/(maxx-minx), sy=(H-topPad-bottomPad)/(maxy-miny); scale=Math.min(sx,sy);
  fittedScale=scale;
  tx=pad+(W-pad*2-(maxx-minx)*scale)/2-minx*scale;
  ty=topPad+(H-topPad-bottomPad-(maxy-miny)*scale)/2-miny*scale; needs=true;
}
function syncChrome(){document.documentElement.style.setProperty('--bar-h',(barEl.offsetHeight||58)+'px');}
function resize(){W=window.innerWidth;H=window.innerHeight;syncChrome();cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);needs=true;}
const COL=D.IACOLORS;
function cleanCaseTitle(i){
  return titleFor(i).replace(/\s+[\u00b7·].*$/,'').replace(/\s+/g,' ').trim();
}
function shortTitle(i){
  const raw=cleanCaseTitle(i);
  return raw.length>34?raw.slice(0,31)+'...':raw;
}
function drawLine(u,v,color,w){
  const a=world2screen(PX[u],PY[u]),b=world2screen(PX[v],PY[v]);
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();
}
function labelParts(label){
  const clean=label.replace(/^The\s+/i,'');
  const m=clean.match(/^(.*?)\s+v\.?\s+(.*)$/i);
  if(m)return[m[1]+' v.',m[2]];
  const ir=clean.match(/^(In\s+re)\s+(.*)$/i);
  if(ir)return[ir[1],ir[2]];
  return[clean];
}
function zoomLabelFactor(){
  const z=Math.max(1,scale/(fittedScale||scale||1));
  return Math.max(0.45,1/Math.sqrt(z));
}
function drawLandmarkLabels(){
  if(!showLandmarks||dragging)return;
  const landmarks=layout==='cluster'?CLUSTER_LANDMARKS:LANDMARKS;
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  for(const i of landmarks){
    if(!isNodeEligible(i))continue;
    if(pathNodeSet&&pathNodes.length&&!pathNodeSet.has(i))continue;
    const p=world2screen(PX[i],PY[i]); if(p[0]<-40||p[0]>W+40||p[1]<-40||p[1]>H+40)continue;
    const r=rad(i); if(r<(layout==='cluster'?5.5:9))continue;
    const lines=labelParts(cleanCaseTitle(i)).slice(0,2).map(s=>s.replace(/\s+/g,' ').trim()).filter(Boolean);
    const shrink=zoomLabelFactor();
    let font=Math.min(10.5,Math.max(5.4,r*0.44))*shrink;
    const minFont=4, maxW=r*1.75, maxH=r*1.42;
    ctx.font='700 '+font+'px -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif';
    while(font>minFont&&(font*0.92*lines.length>maxH||Math.max(...lines.map(s=>ctx.measureText(s).width))>maxW)){
      font-=0.25;ctx.font='700 '+font+'px -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif';
    }
    const lh=font*0.92, top=p[1]-((lines.length-1)*lh)/2;
    ctx.lineWidth=Math.max(1.2,font*0.22);ctx.strokeStyle='rgba(5,7,12,0.72)';ctx.fillStyle='rgba(255,255,255,0.95)';
    lines.forEach((line,n)=>{const y=top+n*lh;ctx.strokeText(line,p[0],y);ctx.fillText(line,p[0],y);});
  }
  ctx.restore();
}
function clusterLabelLines(label){
  const words=label.split(' '), lines=[''];
  for(const w of words){
    const last=lines.length-1, test=(lines[last]+' '+w).trim();
    if(test.length>22&&lines[last])lines.push(w);else lines[last]=test;
  }
  return lines.slice(0,2);
}
function roundedRectPath(x,y,w,h,r){

const legendEls=[];
D.IANAMES.forEach((nm,idx)=>{const d=document.createElement('div');d.className='li';d.innerHTML='<span class="sw" style="background:'+COL[idx]+'"></span><span>'+nm+'</span>';
  d.onclick=()=>{if(compareMode){toggleCompareArea(idx);return;}if(active.has(idx)){active.delete(idx);d.classList.add('off');}else{active.add(idx);d.classList.remove('off');}refreshVisibility(false);};legendEls[idx]=d;li.appendChild(d);});
function compareEdgeCount(){if(compareAreas.length!==2)return 0;const[a,b]=compareAreas;let n=0;for(let k=0;k<E;k++){const u=D.EU[k],v=D.EV[k];if(!isNodeEligible(u)||!isNodeEligible(v))continue;if((D.IA[u]===a&&D.IA[v]===b)||(D.IA[u]===b&&D.IA[v]===a))n++;}return n;}
function updateLegendCompare(){legendEls.forEach((el,idx)=>{el.classList.toggle('cmpA',compareAreas[0]===idx);el.classList.toggle('cmpB',compareAreas[1]===idx);});const b=document.getElementById('bCompare');if(compareMode)b.textContent='Compare: '+compareAreas.length+'/2';else b.textContent='Compare areas: off';}
function toggleCompareArea(idx){const at=compareAreas.indexOf(idx);if(at>=0)compareAreas.splice(at,1);else{if(compareAreas.length>=2)compareAreas.shift();compareAreas.push(idx);}updateLegendCompare();refreshVisibility(false);}
function setAllAreas(on){D.IANAMES.forEach((_,idx)=>{if(on)active.add(idx);else active.delete(idx);});document.querySelectorAll('#legitems .li').forEach(el=>el.classList.toggle('off',!on));refreshVisibility(false);}
document.getElementById('selAll').onclick=()=>{compareAreas=[];updateLegendCompare();setAllAreas(true);updateStats();};
document.getElementById('selNone').onclick=()=>{compareAreas=[];updateLegendCompare();setAllAreas(false);updateStats();};
document.getElementById('subline').textContent=N.toLocaleString()+' opinions · '+E.toLocaleString()+' citations';
function updateStats(){
  const shown=shownCaseCount(), edges=shownEdgeCount();
  const limit=caseLimit?('top '+caseLimit.toLocaleString()):'all cases';
  const base='<b>'+shown.toLocaleString()+'</b> shown cases · <b>'+edges.toLocaleString()+'</b> shown citations<br>'+limit+' of '+N.toLocaleString()+' cases · node size = times cited<br>filtered to the core: 2000+ · 1975–99 cited ≥5 · pre-1975 cited ≥50';
  const cmp=compareMode?'<br><b>Compare:</b> '+(compareAreas.length?compareAreas.map(i=>D.IANAMES[i]).join(' + '):'choose areas')+(compareAreas.length===2?' · '+compareEdgeCount().toLocaleString()+' cross-citations':''):'';
  const p=pathNodes.length?'<br><b>Path:</b> '+pathNodes.length+' cases from '+esc(shortTitle(pathStart))+' to '+esc(shortTitle(pathEnd)):'';
  document.getElementById('stats').innerHTML=base+cmp+p;
}
updateStats();
window.addEventListener('resize',()=>{DPR=Math.min(2,window.devicePixelRatio||1);resize();});
buildAreaLayout();buildClusterLayout();loadStaticNames();resize();buildGrid();fit();loop();
</script></body></html>
